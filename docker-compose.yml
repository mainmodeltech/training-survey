version: "3.9"

networks:
  dokploy-network:
    external: true
  coraf-internal:
    driver: bridge
    internal: true

volumes:
  coraf_pg_data:
    driver: local

services:

  coraf-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - coraf_pg_data:/var/lib/postgresql/data
    networks:
      - coraf-internal
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  coraf-api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      coraf-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@coraf-db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-480}
    networks:
      - coraf-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mt-coraf-api.rule=Host(`coraf.model-technologie.com`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.mt-coraf-api.entrypoints=websecure"
      - "traefik.http.routers.mt-coraf-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mt-coraf-api.priority=10"
      - "traefik.http.routers.mt-coraf-api.service=mt-coraf-api"
      - "traefik.http.services.mt-coraf-api.loadbalancer.server.port=8000"

  coraf-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://coraf.model-technologie.com
    restart: unless-stopped
    depends_on:
      - coraf-api
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mt-coraf-frontend.rule=Host(`coraf.model-technologie.com`)"
      - "traefik.http.routers.mt-coraf-frontend.entrypoints=websecure"
      - "traefik.http.routers.mt-coraf-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mt-coraf-frontend.priority=1"
      - "traefik.http.routers.mt-coraf-frontend.service=mt-coraf-frontend"
      - "traefik.http.services.mt-coraf-frontend.loadbalancer.server.port=80"

  coraf-adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - coraf-db
    networks:
      - coraf-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mt-coraf-adminer.rule=Host(`adminer-coraf.model-technologie.com`)"
      - "traefik.http.routers.mt-coraf-adminer.entrypoints=websecure"
      - "traefik.http.routers.mt-coraf-adminer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mt-coraf-adminer.service=mt-coraf-adminer"
      - "traefik.http.services.mt-coraf-adminer.loadbalancer.server.port=8080"
