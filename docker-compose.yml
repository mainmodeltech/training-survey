version: "3.9"

volumes:
  coraf_pg_data:
    driver: local

services:

  coraf-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - coraf_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  coraf-api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      coraf-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@coraf-db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-480}

  coraf-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://coraf.model-technologie.com
    restart: unless-stopped
    depends_on:
      - coraf-api

  coraf-adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - coraf-db
